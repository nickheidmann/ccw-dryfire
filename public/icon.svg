  <line x1="50" y1="72" x2="50" y2="86" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="14" y1="50" x2="28" y2="50" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="72" y1="50" x2="86" y2="50" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round"/>
